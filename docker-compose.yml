services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: daily_notes
      POSTGRES_PASSWORD: daily_notes_dev
      POSTGRES_DB: daily_notes
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - daily_notes_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daily_notes -d daily_notes"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"
    environment:
      DATABASE_URL: postgresql://daily_notes:daily_notes_dev@postgres:5432/daily_notes?schema=public
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  daily_notes_pg:
